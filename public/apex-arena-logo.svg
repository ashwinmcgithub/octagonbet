<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background -->
  <rect width="500" height="500" rx="80" fill="#0a0a0f"/>
  
  <!-- Outer glow ring -->
  <circle cx="250" cy="220" r="145" fill="none" stroke="#6c47ff" stroke-width="3" opacity="0.4"/>
  
  <!-- Shield / Arena shape -->
  <path d="M250 80 L370 130 L370 240 Q370 320 250 370 Q130 320 130 240 L130 130 Z" 
        fill="#13131f" stroke="#6c47ff" stroke-width="3"/>
  
  <!-- Inner accent lines -->
  <path d="M250 100 L355 145 L355 238 Q355 308 250 352 Q145 308 145 238 L145 145 Z" 
        fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Letter A - bold, centered -->
  <text x="250" y="295" 
        font-family="'Arial Black', 'Impact', sans-serif" 
        font-size="160" 
        font-weight="900"
        text-anchor="middle" 
        fill="url(#grad)">A</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6c47ff"/>
    </linearGradient>
  </defs>

  <!-- Bottom text -->
  <text x="250" y="430" 
        font-family="'Arial', sans-serif" 
        font-size="36" 
        font-weight="700"
        letter-spacing="10"
        text-anchor="middle" 
        fill="#a78bfa"
        opacity="0.9">APEX ARENA</text>

  <!-- Decorative dots -->
  <circle cx="130" cy="430" r="4" fill="#6c47ff" opacity="0.6"/>
  <circle cx="370" cy="430" r="4" fill="#6c47ff" opacity="0.6"/>
</svg>
